<!DOCTYPE html>
<html>
<head>
    <title>Test Image Loading</title>
</head>
<body>
    <h1>Test Profile Image Loading</h1>
    <p>Testing direct image access from backend...</p>
    
    <h2>Test 1: Direct backend access</h2>
    <img src="https://justicepoint-backend.onrender.com/uploads/1755899098916.jpg" alt="Test Image 1" style="max-width: 200px; border: 1px solid red;" onerror="this.style.border='2px solid red'; this.alt='FAILED TO LOAD';">
    
    <h2>Test 2: Another image</h2>
    <img src="https://justicepoint-backend.onrender.com/uploads/1771411083401.jpg" alt="Test Image 2" style="max-width: 200px; border: 1px solid green;" onerror="this.style.border='2px solid red'; this.alt='FAILED TO LOAD';">
    
    <h2>Test 3: Backend test endpoint</h2>
    <div id="test-result">Loading...</div>
    
    <script>
        // Test backend endpoint
        fetch('https://justicepoint-backend.onrender.com/uploads-test')
            .then(response => response.json())
            .then(data => {
                document.getElementById('test-result').innerHTML = 
                    '<h3>Backend Response:</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            })
            .catch(error => {
                document.getElementById('test-result').innerHTML = 
                    '<h3>Backend Error:</h3><pre>' + error.message + '</pre>';
            });
    </script>
</body>
</html>
